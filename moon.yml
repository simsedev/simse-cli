language: 'rust'
tags: ['cli']

workspace:
  inheritedTasks:
    exclude: ['lint', 'setup', 'build', 'dev', 'test', 'start']

fileGroups:
  sources:
    - 'src/**/*'
    - 'Cargo.toml'
    - 'Cargo.lock'
    - 'build.rs'

tasks:
  setup:
    command: 'cargo fetch'
    inputs: ['@globs(sources)']
  build:
    command: 'cargo build --release'
    inputs: ['@globs(sources)']
  dev:
    command: 'cargo build'
    inputs: ['@globs(sources)']
  lint:
    command: 'cargo clippy --all-targets -- -D warnings'
    inputs: ['@globs(sources)']
  format-check:
    command: 'cargo fmt --check'
    inputs: ['@globs(sources)']
  test:
    command: 'cargo test'
    inputs: ['@globs(sources)']
