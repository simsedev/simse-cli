language: 'rust'
tags: ['cli']

# simse-cli is a hybrid repo: the Rust `simse` binary crate PLUS the TypeScript
# plugin SDK (plugin-sdk/) and bundled plugins (plugins/). The cargo tasks build
# the binary; the plugins-* tasks cover the TS ecosystem so neither is dropped
# from `moon run` coverage.
workspace:
  inheritedTasks:
    exclude: ['lint', 'setup', 'build', 'dev', 'test', 'start']

fileGroups:
  sources:
    - 'src/**/*'
    - 'Cargo.toml'
    - 'Cargo.lock'
    - 'build.rs'
  plugins:
    - 'plugin-sdk/src/**/*'
    - 'plugins/**/*.ts'
    - 'plugins/**/plugin.json'
    - 'plugins/**/tsconfig.json'

tasks:
  setup:
    command: 'cargo fetch'
    inputs: ['@globs(sources)']
  build:
    command: 'cargo build --release'
    inputs: ['@globs(sources)']
  dev:
    command: 'cargo build'
    inputs: ['@globs(sources)']
  lint:
    command: 'cargo clippy --all-targets -- -D warnings'
    inputs: ['@globs(sources)']
  format-check:
    command: 'cargo fmt --check'
    inputs: ['@globs(sources)']
  test:
    command: 'cargo test'
    inputs: ['@globs(sources)']

  # TypeScript plugin SDK + bundled plugins (preserved from the pre-split
  # moon.yml so the TS ecosystem stays covered by `moon run`).
  plugins-setup:
    command: 'bun install'
    inputs:
      - 'bun.lock'
      - 'plugin-sdk/package.json'
      - 'plugins/*/package.json'
  plugins-validate:
    command: 'bash scripts/validate-plugins.sh'
    inputs:
      - 'plugins/*/plugin.json'
      - 'scripts/validate-plugins.sh'
  plugins-typecheck:
    command: 'bash scripts/typecheck.sh'
    inputs:
      - '@globs(plugins)'
      - 'scripts/typecheck.sh'
