name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Validate plugins
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout simse-cli
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate plugin manifests
        run: bash scripts/validate-plugins.sh

      - name: Typecheck SDK and plugins
        run: bash scripts/typecheck.sh

  build:
    name: Build ${{ matrix.platform }}
    needs: check
    runs-on: ${{ matrix.os }}
    env:
      CORE_REPO_PAT: ${{ secrets.CORE_REPO_PAT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     target: x86_64-unknown-linux-gnu,    platform: linux-x86_64 }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu,   platform: linux-aarch64 }
          - { os: macos-13,         target: x86_64-apple-darwin,         platform: darwin-x86_64 }
          - { os: macos-14,         target: aarch64-apple-darwin,        platform: darwin-aarch64 }
          - { os: windows-2022,     target: x86_64-pc-windows-msvc,      platform: windows-x86_64 }
          - { os: windows-11-arm,   target: aarch64-pc-windows-msvc,     platform: windows-aarch64 }
    steps:
      - name: Checkout simse-cli
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: PAT absent — skip
        if: env.CORE_REPO_PAT == ''
        run: echo "::notice::CORE_REPO_PAT not provisioned — release build skipped."

      - name: Read core ref
        if: env.CORE_REPO_PAT != ''
        id: coreref
        shell: bash
        run: echo "ref=$(tr -d '[:space:]' < CORE_REF)" >> "$GITHUB_OUTPUT"

      - name: Checkout core
        if: env.CORE_REPO_PAT != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: simsedev/core
          ref: ${{ steps.coreref.outputs.ref }}
          token: ${{ env.CORE_REPO_PAT }}
          path: core

      - name: Install Rust toolchain
        if: env.CORE_REPO_PAT != ''
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        if: env.CORE_REPO_PAT != ''
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: core

      - name: Build simse
        if: env.CORE_REPO_PAT != ''
        working-directory: core
        run: cargo build --release --locked --features cli --bin simse --target ${{ matrix.target }}

      - name: Install bun
        if: env.CORE_REPO_PAT != ''
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0

      - name: Assemble archive
        if: env.CORE_REPO_PAT != ''
        shell: bash
        run: bash scripts/assemble-dist.sh "${{ matrix.target }}" "${{ matrix.platform }}"

      - name: Upload archive artifact
        if: env.CORE_REPO_PAT != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: simse-${{ matrix.platform }}
          path: |
            simse-${{ matrix.platform }}.tar.gz
            simse-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum simse-* > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: |
            artifacts/simse-*.tar.gz
            artifacts/simse-*.zip
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
